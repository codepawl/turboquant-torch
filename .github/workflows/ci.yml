name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Ruff check
        run: ruff check --output-format=github turboquant/ tests/ examples/
      - name: Ruff format
        run: ruff format --check turboquant/ tests/ examples/
      - name: Mypy
        run: mypy turboquant/

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=turboquant --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]" pip-audit safety
      - name: Audit dependencies (pip-audit)
        run: pip-audit --skip-editable --ignore-vuln CVE-2026-4539
      - name: Check for known vulnerabilities (safety)
        run: safety check
        continue-on-error: true
      - name: Bandit security lint (via ruff S rules)
        run: ruff check --select S --output-format=github turboquant/

  build:
    name: Build Package
    needs: [test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Build sdist and wheel
        run: uv build
      - name: Check package
        run: |
          uv pip install --system twine
          twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
